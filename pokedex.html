<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Pokédex</title>
    <link rel="stylesheet" href="./pokedex.css">
</head>
<body>
    <nav class="menu">
        <h2>Pokédex</h2>
        <ul>
            <li>Início</li>
            <li>Regiões</li>
            <li>Batalha</li>
        </ul>
    </nav>

    <header class="capa">
        <h1>Escolha seu Pokémon Inicial</h1>
    </header>

    <main class="galeria-pokemon">
        <div class="cartao">
            <img src="https://img.pokemondb.net/sprites/home/normal/bulbasaur.png" alt="Bulbasaur" width="150">
            <h3>Bulbasaur</h3>
            
            <div class="tipos">
                <span class="badge planta">Planta</span>
                <span class="badge veneno">Veneno</span>
            </div>
              <button class="botao-pulsar">TREINAR</button>
        </div>

        <div class="cartao">
            <img src="https://img.pokemondb.net/sprites/home/normal/1x/charmander.png" alt="Charmander" width="150">
            <h3>Charmander</h3>
            <p class="badge fogo">Fogo</p>
        </div>

        <div class="cartao">
            <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/7.png" alt="Squirtle" width="150">
            <h3>Squirtle</h3>
            <p class="badge água">Água</p>
        </div>

        <div class="cartao">
            <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/25.png" alt="Pikachu" width="150">
            <h3>Pikachu</h3>
            <p class="badge elétrico">Elétrico</p>
        </div>
    </main>


</body>
</html>
