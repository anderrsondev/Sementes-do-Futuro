<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./calculadora.css">
</head>

<body>

    <div class="calculadora">
        <div class="visor">
            <p>0</p>
        </div>
        <div class="area-botao">
            <button class="botao-limpar">C</button>
            <button class="botao-">/</button>
            <button>*</button>
            <button>7</button>
            <button>8</button>
            <button>9</button>
            <button class="botao-subtracao">-</button>
            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button class="botao-adcao">+</button>
            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button>0</button>
            <button>.</button>
            <button>=</button>
        </div>
    </div>
    
</body>

</html>
