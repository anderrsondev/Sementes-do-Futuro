<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora teste</title>
    <link rel="stylesheet" href="./calculadora.css">
</head>

<body>

    <div class="calculadora">

        <div class="visor">
            <p>0</p>
        </div>

        <div class="area-botao">
            <button class="botao-limpar">C</button>
            <button>+/-</button>
            <button>%</button>
            <button class="botao-divisao">*</button>
            <button>7</button>
            <button>8</button>
            <button>9</button>
            <button class="botao-multiplicacao">x</button>
            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button class="botao-menos">-</button>
            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button class="botao-mais">+</button>
            <button class="botao-zero">0</button>
            <button class="botao-ponto">.</button>
            <button class="botao-resultado">=</button>
        </div>

    </div>


</body>

</html>
